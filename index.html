<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PWA iPad - Apple Pencil</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PWA iPad">
    
    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Prevent zoom on input focus -->
    <meta name="format-detection" content="telephone=no">
</head>
<body>
    <div id="app">
        <div class="app-content">
            <main class="app-main">
                <div class="bottom-section">
                    <canvas id="drawingCanvas" class="drawing-canvas"></canvas>
                </div>
            </main>
            
            <aside class="toolbar-vertical">
                <button id="clearBtn" class="btn-vertical">🧹</button>
                <button id="colorBtn" class="btn-vertical">🎨</button>
                <div class="slider-container">
                    <div class="size-emoji elephant-emoji">🐘</div>
                    <input type="range" id="brushSize" min="1" max="20" value="5" class="slider-vertical">
                    <div class="size-emoji">🐭</div>
                </div>
            </aside>
        </div>
        
        <div id="colorPicker" class="color-picker hidden">
            <div class="color-option" data-color="#000000" style="background-color: #000000;"></div>
            <div class="color-option" data-color="#ff0000" style="background-color: #ff0000;"></div>
            <div class="color-option" data-color="#00ff00" style="background-color: #00ff00;"></div>
            <div class="color-option" data-color="#0000ff" style="background-color: #0000ff;"></div>
            <div class="color-option" data-color="#ffff00" style="background-color: #ffff00;"></div>
            <div class="color-option" data-color="#ff00ff" style="background-color: #ff00ff;"></div>
            <div class="color-option" data-color="#00ffff" style="background-color: #00ffff;"></div>
            <div class="color-option" data-color="#ffffff" style="background-color: #ffffff; border: 1px solid #ccc;"></div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        // Register service worker (optimized for development)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
