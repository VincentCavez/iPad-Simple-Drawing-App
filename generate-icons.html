<!DOCTYPE html>
<html>
<head>
    <title>Générateur d'icônes PWA</title>
</head>
<body>
    <h1>Générateur d'icônes PWA</h1>
    <canvas id="canvas" style="border: 1px solid #ccc;"></canvas>
    <br><br>
    <button onclick="generateIcons()">Générer toutes les icônes</button>
    
    <script>
        const sizes = [16, 32, 72, 96, 128, 144, 152, 180, 192, 384, 512];
        
        function generateIcon(size) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = size;
            canvas.height = size;
            
            // Fond dégradé
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#007AFF');
            gradient.addColorStop(1, '#5856D6');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Forme centrale (stylo/crayon)
            ctx.fillStyle = 'white';
            ctx.beginPath();
            
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.3;
            
            // Dessiner un crayon stylisé
            ctx.moveTo(centerX - radius * 0.3, centerY - radius);
            ctx.lineTo(centerX + radius * 0.3, centerY - radius);
            ctx.lineTo(centerX + radius * 0.5, centerY + radius * 0.5);
            ctx.lineTo(centerX, centerY + radius);
            ctx.lineTo(centerX - radius * 0.5, centerY + radius * 0.5);
            ctx.closePath();
            ctx.fill();
            
            // Ajouter des détails
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.rect(centerX - radius * 0.2, centerY - radius * 0.8, radius * 0.4, radius * 0.3);
            ctx.fill();
            
            return canvas.toDataURL('image/png');
        }
        
        function downloadIcon(dataURL, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = dataURL;
            link.click();
        }
        
        function generateIcons() {
            sizes.forEach(size => {
                const dataURL = generateIcon(size);
                downloadIcon(dataURL, `icon-${size}x${size}.png`);
            });
            alert('Toutes les icônes ont été générées ! Déplacez-les dans le dossier icons/');
        }
    </script>
</body>
</html>
